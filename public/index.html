<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In / Sign Up</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- LOGO -->
  <div class="logo-container">
    <img src="logo.png" alt="Logo" />
  </div>

  <!-- CARD -->
  <div class="card">
    <div class="form-container" id="form-container">
      <h1 id="form-title">Sign In</h1>

      <form id="auth-form">

        <!-- ID NO -->
        <div class="field">
          <input 
            type="text" 
            id="id_no" 
            name="id_no"
            placeholder="ID Number" 
            required 
          />
        </div>

        <!-- FULL NAME (Sign Up only) -->
        <div class="field" id="full-name-field" style="display:none;">
          <input 
            type="text" 
            id="full_name" 
            name="full_name"
            placeholder="Full Name" 
          />
        </div>

        <!-- EMAIL (Sign Up only) -->
        <div class="field" id="email-field" style="display:none;">
          <input 
            type="email" 
            id="email" 
            name="email"
            placeholder="Email" 
          />
        </div>

        <!-- PASSWORD -->
        <div class="field password-field">
          <input 
            type="password" 
            id="password" 
            name="password"
            placeholder="Password" 
            required 
          />
          <button type="button" class="toggle-password" id="togglePassword">
            👁
          </button>
        </div>

        <!-- CONFIRM PASSWORD (Sign Up only) -->
        <div class="field password-field" id="confirm-password-field" style="display:none;">
          <input 
            type="password" 
            id="confirm-password" 
            placeholder="Confirm Password" 
          />
          <button type="button" class="toggle-password" id="toggleConfirmPassword">
            👁
          </button>
        </div>

        <!-- ROLE (Sign Up only) -->
        <div class="field" id="role-field" style="display:none;">
          <select id="role" name="role">
            <option value="">Select Role</option>
            <option value="Executive">Executive</option>
            <option value="Admin">Admin</option>
            <option value="NOC">NOC</option>
            <option value="Finance">Finance</option>
          </select>
        </div>

        <!-- REMEMBER / FORGOT -->
        <div class="extra-options" id="extra-options">
          <label class="remember">
            <input type="checkbox" />
            Remember me
          </label>
          <a href="#" class="forgot">Forgot Password?</a>
        </div>

        <button type="submit" id="submit-btn">Sign In</button>
      </form>

      <p class="switch-text">
        <span id="switch-text">Don't have an account?</span>
        <span id="toggle-btn" style="cursor:pointer; color:blue;">Sign Up</span>
      </p>

      <p id="message"></p>

    </div>
  </div>
  

  <script src="app.js"></script>
</body>
</html>
