<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In / Sign Up</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- LOGO -->
  <div class="logo-container">
    <img src="logo.png" alt="Logo" />
  </div>

  <!-- CARD -->
  <div class="card">
    <div class="form-container" id="form-container">
      <h1 id="form-title">Sign In</h1>

      <form id="auth-form">

        <!-- EMAIL -->
        <div class="field">
          <input type="email" id="email" placeholder="Email" required />
        </div>

        <!-- PASSWORD -->
        <div class="field password-field">
          <input type="password" id="password" placeholder="Password" required />
          <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
            <svg class="eye-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>

        <!-- CONFIRM PASSWORD (Sign Up only) -->
        <div class="field password-field" id="confirm-password-field" style="display:none;">
          <input type="password" id="confirm-password" placeholder="Confirm Password" />
          <button type="button" class="toggle-password" id="toggleConfirmPassword" aria-label="Toggle password visibility">
            <svg class="eye-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </div>

        <!-- ROLE (Sign Up only) -->
        <div class="field" id="role-field" style="display:none;">
          <select id="role">
            <option value="">Select Role</option>
            <option>Executive</option>
            <option>Admin</option>
            <option>NOC</option>
            <option>Finance</option>
          </select>
        </div>

        <!-- REMEMBER / FORGOT -->
        <div class="extra-options" id="extra-options">
          <label class="remember">
            <input type="checkbox" />
            Remember me
          </label>
          <a href="#" class="forgot">Forgot Password?</a>
        </div>

        <button type="submit" id="submit-btn">Sign In</button>
      </form>

      <p class="switch-text">
        <span id="switch-text">Don't have an account?</span>
        <span id="toggle-btn">Sign Up</span>
      </p>

      <p id="message"></p>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
