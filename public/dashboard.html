<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">

  <link rel="stylesheet" href="dashboard.css">
  <script defer src="dashboard.js"></script>
</head>
<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">

    <div class="logo">
      <img src="logo.png" alt="Logo" class="logo-img">
    </div>

    <ul class="menu">
      <li class="active"><i class="ri-dashboard-line"></i><span>Dashboard</span></li>
      <li><i class="ri-terminal-line"></i><span>Terminals</span></li>
      <li><i class="ri-error-warning-line"></i><span>Problematic Sites</span></li>
      <li><i class="ri-ticket-line"></i><span>Ticket</span></li>
      <li><i class="ri-bar-chart-line"></i><span>Reports</span></li>
      <li><i class="ri-file-line"></i><span>Letters</span></li>
      <li><i class="ri-settings-3-line"></i><span>Settings</span></li>
      <li data-label="Map"><i class="ri-map-2-line"></i><span>Map</span></li>
      <li id="logout"><i class="ri-logout-box-r-line"></i><span>Logout</span></li>
    </ul>

    <button id="toggleSidebar" class="collapse-btn">
      <i class="ri-arrow-left-s-line"></i>
    </button>

  </aside>

  <!-- MAIN CONTENT -->
  <main class="main">

    <!-- THIS IS THE ONLY NEW WRAPPER -->
    <div id="mainContent"></div>

  </main>
</div>

</body>
</html>
